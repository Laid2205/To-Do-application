<main class="auth-page">
  <section class="auth-card">
    <h1 class="h3 fw-bold mb-3">Register</h1>
    <p class="text-secondary mb-4">Create an account to use the to-do app.</p>

    <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>

    <form (ngSubmit)="submit()">
      <div class="mb-3">
        <label class="form-label fw-semibold" for="email">Email</label>
        <input id="email" name="email" [(ngModel)]="email" type="email" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold" for="password">Password</label>
        <input id="password" name="password" [(ngModel)]="password" type="password" class="form-control" required>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold" for="confirmPassword">Confirm password</label>
        <input id="confirmPassword" name="confirmPassword" [(ngModel)]="confirmPassword" type="password" class="form-control" required>
      </div>
      <button class="btn btn-primary w-100" type="submit" [disabled]="isLoading">
        {{ isLoading ? 'Creating account...' : 'Register' }}
      </button>
    </form>

    <p class="text-secondary small mt-4 mb-0">
      Already have an account?
      <a routerLink="/login">Log in</a>
    </p>
  </section>
</main>
